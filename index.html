<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="description" content="İlk Türk devletleri bilgilerini kartlarla eşleştiren mobil uyumlu tarih oyunu.">
    <title>İlk Türk Devletleri · Eşini Bul</title>
    <link rel="stylesheet" href="styles.css?v=20260616-repeat">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">İlk Türk Devletleri Kartları</p>
          <h1>Eşini Bul</h1>
          <p class="subtitle">Tanım kartını ona ait cevap kartıyla buluştur.</p>
        </div>
        <div class="deck-mark" aria-label="Kart destesi">
          <span>150</span>
          <small>kartlık deste</small>
        </div>
      </header>

      <section class="game-board" aria-labelledby="definitionText">
        <div class="game-toolbar">
          <label for="topicSelect">
            <span>Kart destesi</span>
            <select id="topicSelect"></select>
          </label>
          <p id="deckInfo" class="deck-info"></p>
        </div>

        <div class="pair-area">
          <article id="definitionCard" class="definition-card">
            <p class="card-label">TANIM KARTI</p>
            <h2 id="definitionText"></h2>
          </article>

          <div class="pair-connector" aria-hidden="true">
            <span></span>
          </div>

          <article id="answerCard" class="answer-card-display" aria-live="polite">
            <div class="answer-card-topline">
              <p class="card-label">CEVAP KARTI</p>
              <span id="answerCounter">Kart 1 / 10</span>
            </div>
            <h2 id="answerText"></h2>
          </article>
        </div>

        <div id="feedbackPanel" class="feedback-panel" aria-live="polite" hidden>
          <strong id="feedbackTitle"></strong>
          <p id="feedbackText"></p>
        </div>

        <div class="game-actions">
          <button id="anotherCardButton" class="secondary-button" type="button">Başka kart göster</button>
          <button id="matchButton" class="primary-button" type="button">Bu ikisini eşleştir</button>
        </div>
      </section>

      <footer>
        Cevap kartlarını tek tek gez, eşleşen çifti gördüğünde bir araya getir.
      </footer>
    </main>

    <script src="app.js?v=20260616-repeat"></script>
  </body>
</html>
